# Infra + traffic only. API runs via LogAnalyzer.AppHost / dotnet run (not in this file).
# Compose reads project-root ".env" for ${VAR} substitution (see .env.example).

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-loganalyzer}
      POSTGRES_USER: ${POSTGRES_USER:-loganalyzer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loganalyzer}
    ports:
      - "5432:5432"
    networks:
      - log-analyzer-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: loganalyzer-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - log-analyzer-network

  mock-log-producer:
    build:
      context: ./mock-log-producer
      dockerfile: Dockerfile
    container_name: mock-log-producer
    logging:
      driver: gelf
      options:
        gelf-address: ${GRAYLOG_GELF_ADDRESS:-udp://host.docker.internal:12201}
        tag: mock-log-producer
    networks:
      - log-analyzer-network

networks:
  log-analyzer-network:
    driver: bridge
